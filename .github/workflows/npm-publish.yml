name: Node.js CI (Secure Bot)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x]

    steps:
    # Checkout repo
    - name: Checkout code
      uses: actions/checkout@v3

    # Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    # Install dependencies safely
    - name: Install dependencies
      run: npm ci

    # 🔐 Admin Only Security Check (using GitHub Secret)
    - name: Verify Admin Access
      run: |
        if [ "${{ secrets.ADMIN_KEY }}" != "MY_SECRET_ADMIN" ]; then
          echo "❌ Unauthorized! Only admin can run this."
          exit 1
        fi

    # 🚀 Start bot with auto-restart loop
    - name: Start Bot (Auto Restart Mode)
      env:
        PORT: 8080
      run: |
        echo "🔥 Bot starting in secure mode..."
        while true; do
          npm start
          echo "⚠️ Bot crashed! Restarting in 5 seconds..."
          sleep 5
        done

    # 🛡️ Extra protection: timeout + retry
    - name: Keep Alive Protection
      run: echo "Bot running with protection layer"
      timeout-minutes: 360
