name: Run Bot 24/7

on:
  schedule:
    - cron: "*/30 * * * *"  # প্রতি 30 মিনিটে run
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Clone Repo
      uses: actions/checkout@v3

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: 📦 Install
      run: npm install

    - name: 🚀 Run Bot (Short time)
      run: |
        echo "Bot starting..."
        timeout 20m node index.js || echo "Restarting..."
