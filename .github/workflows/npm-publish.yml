name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-bot:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Dependencies
      run: npm install

    # 🔥 Auto Restart Loop
    - name: Run Bot (Auto Restart)
      run: |
        while true
        do
          echo "🚀 Starting Bot..."
          npm start
          echo "❌ Bot crashed! Restarting in 5 seconds..."
          sleep 5
        done
