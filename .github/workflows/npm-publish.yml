name: 🚀 Ultimate Secure Bot v2

on:
  schedule:
    - cron: "*/15 * * * *"   # প্রতি 15 মিনিটে run
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v3

    - name: ⚙️ Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: 📦 Install
      run: npm install

    - name: 🔐 Security Check
      run: |
        if [ -z "${{ secrets.APPSTATE }}" ]; then
          echo "❌ Missing APPSTATE"; exit 1;
        fi
        if [ -z "${{ secrets.OWNER_ID }}" ]; then
          echo "❌ Missing OWNER_ID";61582071385233;
        fi

    - name: 🛡️ Inject Secrets
      run: |
        echo "APPSTATE=${{ secrets.APPSTATE }}" >> .env
        echo "OWNER_ID=${{ secrets.OWNER_ID }}" >> .env

    - name: 🚀 Run Bot Loop
      run: |
        echo "🔥 Starting Bot Loop..."
        for i in {1..3}
        do
          echo "🔁 Cycle $i"
          timeout 10m node index.js || echo "⚠️ Crash detected"
          sleep 5
        done

    - name: 📊 Status Output
      if: always()
      run: echo "✅ Cycle finished - Restart scheduled"

    - name: 🔁 Force Re-run Trigger
      if: always()
      run: |
        echo "⏰ Waiting for next cron run..."
